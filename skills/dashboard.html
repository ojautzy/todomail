<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todomail - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { darkBg: '#0f172a', darkCard: '#1e293b', darkSidebar: '#162032' } } }
        }
    </script>
    <style>
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.3s ease-out forwards; }
        .glass-nav { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .dark .glass-nav { background: rgba(15, 23, 42, 0.8); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .card-expand { max-height: 0; overflow: hidden; transition: max-height 0.35s ease-out, opacity 0.25s ease-out; opacity: 0; }
        .card-expand.open { max-height: 600px; opacity: 1; transition: max-height 0.45s ease-in, opacity 0.3s ease-in; }
        .card-expand.open .card-expand-inner { max-height: 500px; overflow-y: auto; }
        .card-expand-inner::-webkit-scrollbar { width: 6px; }
        .card-expand-inner::-webkit-scrollbar-track { background: transparent; }
        .card-expand-inner::-webkit-scrollbar-thumb { background: rgba(148,163,184,0.3); border-radius: 3px; }
        .card-expand-inner::-webkit-scrollbar-thumb:hover { background: rgba(148,163,184,0.5); }
    </style>
</head>
<body class="bg-slate-50 dark:bg-darkBg text-slate-900 dark:text-slate-100 transition-colors duration-500 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;

        const SUBDIRS = [
            { key: "trash", label: "Corbeille", icon: "trash-2", displayField: "summary", displayLabel: "Resumé" },
            { key: "do-read-quick", label: "A lire (rapide)", icon: "book-open", displayField: "synth", displayLabel: "Synthèse" },
            { key: "do-read-long", label: "A lire (long)", icon: "file-text", displayField: "detailed-synth", displayLabel: "Synthèse détaillée" },
            { key: "do-decide", label: "Arbitrages rapides", icon: "scale", displayField: "choose-points", displayLabel: "Points d'arbitrage" },
            { key: "do-consult-and-decide", label: "Arbitrages après consultation", icon: "users", displayField: "choose-points", displayLabel: "Points d'arbitrage", extraField: "transmit", extraLabel: "Personne à consulter" },
            { key: "do-other", label: "A déléguer", icon: "forward", displayField: "synth", displayLabel: "Synthèse", extraField: "transmit", extraLabel: "Personne délégataire" },
            { key: "do-self", label: "A faire", icon: "user-check", displayField: "synth", displayLabel: "Synthèse" },
        ];

        const TASK_SECTIONS = [
            { key: "consult", label: "Suivi consultations", icon: "eye" },
            { key: "to-send", label: "Mails à envoyer", icon: "send" },
            { key: "to-work", label: "Travail à faire", icon: "clipboard-list" },
        ];

        const Icon = ({ name, size = 20, className = "" }) => {
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        // Parse YAML frontmatter from markdown content
        function parseFrontmatter(content) {
            const match = content.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n?([\s\S]*)$/);
            if (!match) return { meta: {}, body: content };
            const meta = {};
            match[1].split('\n').forEach(line => {
                const idx = line.indexOf(':');
                if (idx > 0) {
                    const key = line.slice(0, idx).trim();
                    const val = line.slice(idx + 1).trim();
                    meta[key] = val;
                }
            });
            return { meta, body: match[2] };
        }

        // Parse consult.md markdown table into array of objects
        function parseConsultMd(content) {
            const lines = content.split('\n').filter(l => l.trim().startsWith('|'));
            if (lines.length < 2) return [];
            // Skip header and separator rows
            return lines.slice(2).map(line => {
                const cells = line.split('|').map(c => c.trim()).filter(c => c);
                if (cells.length >= 4) {
                    return { id: cells[0], date: cells[1], destinataire: cells[2], resume: cells[3] };
                }
                return null;
            }).filter(Boolean);
        }

        // Rebuild consult.md content from entries
        function buildConsultMd(entries) {
            let md = "# Registre des consultations\n\n| ID | Date | Destinataire | Résumé |\n|----|------|-------------|--------|\n";
            entries.forEach(e => {
                md += `| ${e.id} | ${e.date} | ${e.destinataire} | ${e.resume} |\n`;
            });
            return md;
        }

        // Retro-compat lecture pending_emails.json : accepte v1 (tableau brut)
        // et v2 (wrapper { "_meta": ..., "emails": [...] }). Renvoie toujours
        // un tableau.
        function extractEmails(data) {
            if (Array.isArray(data)) return data;
            if (data && Array.isArray(data.emails)) return data.emails;
            return [];
        }

        // Variante v2 : renvoie aussi le bloc _meta pour le banner de fraicheur.
        function extractEmailsAndMeta(data) {
            if (Array.isArray(data)) return { emails: data, meta: null };
            if (data && Array.isArray(data.emails)) {
                return { emails: data.emails, meta: data._meta || null };
            }
            return { emails: [], meta: null };
        }

        // Retro-compat lecture instructions.json : v1 (tableau brut) ou
        // v2 (wrapper { "_meta": ..., "instructions": [...] }).
        function extractInstructionsAndMeta(data) {
            if (Array.isArray(data)) return { instructions: data, meta: null };
            if (data && Array.isArray(data.instructions)) {
                return { instructions: data.instructions, meta: data._meta || null };
            }
            return { instructions: [], meta: null };
        }

        // Extract recipient display name from filename like "jean-martin_01.md"
        function recipientFromFilename(filename) {
            const base = filename.replace(/\.md$/, '');
            const parts = base.split('_');
            parts.pop(); // remove number
            return parts.join('_').split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
        }

        // Recursive directory removal via File System Access API
        async function removeDirectoryRecursive(parentHandle, dirName) {
            await parentHandle.removeEntry(dirName, { recursive: true });
        }

        // ========== PHASE 5 — Persistance du DirectoryHandle via IndexedDB ==========
        // Le navigateur peut persister un FileSystemDirectoryHandle entre sessions.
        // Apres la premiere autorisation, on evite le picker a chaque rechargement :
        // un simple queryPermission() suffit, et si l'autorisation a survecu
        // (cas typique en session Chromium/DIA), l'utilisateur ne voit rien du tout.

        const DB_NAME = 'todomail-dashboard';
        const DB_STORE = 'handles';
        const DB_KEY = 'rootHandle';

        function openHandleDb() {
            return new Promise((resolve, reject) => {
                const req = indexedDB.open(DB_NAME, 1);
                req.onupgradeneeded = () => {
                    req.result.createObjectStore(DB_STORE);
                };
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => reject(req.error);
            });
        }

        async function saveHandle(handle) {
            try {
                const db = await openHandleDb();
                await new Promise((resolve, reject) => {
                    const tx = db.transaction(DB_STORE, 'readwrite');
                    tx.objectStore(DB_STORE).put(handle, DB_KEY);
                    tx.oncomplete = () => resolve();
                    tx.onerror = () => reject(tx.error);
                });
                db.close();
            } catch (e) { console.warn('IndexedDB saveHandle:', e); }
        }

        async function loadHandle() {
            try {
                const db = await openHandleDb();
                const handle = await new Promise((resolve, reject) => {
                    const tx = db.transaction(DB_STORE, 'readonly');
                    const req = tx.objectStore(DB_STORE).get(DB_KEY);
                    req.onsuccess = () => resolve(req.result || null);
                    req.onerror = () => reject(req.error);
                });
                db.close();
                return handle;
            } catch (e) { console.warn('IndexedDB loadHandle:', e); return null; }
        }

        async function clearHandle() {
            try {
                const db = await openHandleDb();
                await new Promise((resolve, reject) => {
                    const tx = db.transaction(DB_STORE, 'readwrite');
                    tx.objectStore(DB_STORE).delete(DB_KEY);
                    tx.oncomplete = () => resolve();
                    tx.onerror = () => reject(tx.error);
                });
                db.close();
            } catch (e) { console.warn('IndexedDB clearHandle:', e); }
        }

        function App() {
            const [isDark, setIsDark] = useState(false);
            const [rootHandle, setRootHandle] = useState(null);
            const [browserSupported] = useState(() => typeof window.showDirectoryPicker === 'function');
            const [reconnecting, setReconnecting] = useState(true); // tentative reconnexion auto au mount
            const [pendingHandle, setPendingHandle] = useState(null); // handle memorise en attente de permission
            const [emails, setEmails] = useState([]);
            const [searchTerm, setSearchTerm] = useState("");
            const [selectedMail, setSelectedMail] = useState(null);
            const [decisions, setDecisions] = useState({});
            const [activeSubdir, setActiveSubdir] = useState("trash");
            const [expandedCard, setExpandedCard] = useState(null);
            const [counts, setCounts] = useState({});
            const [saveStatus, setSaveStatus] = useState(null);
            const [activeView, setActiveView] = useState("categorization");

            // Tasks view state
            const [activeTaskSection, setActiveTaskSection] = useState("consult");
            const [taskSearchTerm, setTaskSearchTerm] = useState("");
            const [consultEntries, setConsultEntries] = useState([]);
            const [toSendFiles, setToSendFiles] = useState([]);
            const [toWorkTasks, setToWorkTasks] = useState([]);
            const [expandedTaskCard, setExpandedTaskCard] = useState(null);
            const [editModal, setEditModal] = useState(null); // { type, key, content }
            const [confirmDelete, setConfirmDelete] = useState(null); // { type, key, label }
            const [copiedField, setCopiedField] = useState(null); // "to:filename" or "body:filename"
            const [taskCounts, setTaskCounts] = useState({ consult: 0, "to-send": 0, "to-work": 0 });

            // ========== PHASE 5 — watch + versioning + erreurs + memoire ==========
            const [pendingMeta, setPendingMeta] = useState(null);          // _meta du pending_emails.json courant
            const [instructionsMeta, setInstructionsMeta] = useState(null); // _meta du instructions.json courant
            const [workspaceState, setWorkspaceState] = useState(null);    // contenu de .todomail/state.json
            const [invalidateStamp, setInvalidateStamp] = useState(null);  // lastModified de .todomail/invalidate.txt
            const [errorsPanelOpen, setErrorsPanelOpen] = useState(false);
            const [dismissedIds, setDismissedIds] = useState(new Set());    // IDs retires cote UI apres bouton Ignorer

            // Etat vue Memoire
            const [memorySection, setMemorySection] = useState('claude');   // 'claude' | 'people' | 'projects' | 'context'
            const [memoryFiles, setMemoryFiles] = useState([]);             // [{ name, path, content }]
            const [memorySearch, setMemorySearch] = useState('');
            const [expandedMemoryCard, setExpandedMemoryCard] = useState(null);
            const [memoryCounts, setMemoryCounts] = useState({ claude: 0, people: 0, projects: 0, context: 0 });

            const activeConfig = SUBDIRS.find(s => s.key === activeSubdir);
            const defaultAction = activeSubdir === 'trash' ? 'delete' : 'other';

            const currentSessionId = workspaceState && workspaceState.session_id ? workspaceState.session_id : null;
            const activeLock = workspaceState && workspaceState.active_lock ? workspaceState.active_lock : null;
            const isLocked = !!activeLock;
            const rawErrors = (workspaceState && Array.isArray(workspaceState.errors)) ? workspaceState.errors : [];
            const displayedErrors = rawErrors.filter(e => !dismissedIds.has(e.mail_id));
            const errorsCount = displayedErrors.length;

            // Banner de fraicheur retire en alpha.8 post-test : la comparaison
            // session_id entre pending_emails.json._meta et state.json generait
            // des faux positifs permanents (sort-mails ecrit un UUID custom,
            // lib.state un timestamp). Le polling 3s + le rechargement a chaque
            // switchSubdir + le verrou visuel pendant un cycle suffisent a
            // garantir la coherence visible. La normalisation des session_id
            // est reportee en Phase 6 (voir CHANGELOG alpha.8).

            useEffect(() => {
                if (isDark) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }, [isDark]);

            useEffect(() => {
                const timer = setTimeout(() => lucide.createIcons(), 50);
                return () => clearTimeout(timer);
            }, [activeSubdir, rootHandle, emails, selectedMail, isDark, expandedCard, saveStatus, activeView, activeTaskSection, consultEntries, toSendFiles, toWorkTasks, expandedTaskCard, editModal, confirmDelete, copiedField]);

            const showToast = (type) => {
                setSaveStatus(type);
                setTimeout(() => setSaveStatus(null), 2000);
            };

            // ========== CATEGORIZATION VIEW LOGIC (unchanged) ==========

            const loadAllCounts = async (handle) => {
                const newCounts = {};
                for (const subdir of SUBDIRS) {
                    try {
                        const todoDir = await handle.getDirectoryHandle('todo');
                        const categoryDir = await todoDir.getDirectoryHandle(subdir.key);
                        const fileHandle = await categoryDir.getFileHandle('pending_emails.json');
                        const data = JSON.parse(await (await fileHandle.getFile()).text());
                        const { emails } = extractEmailsAndMeta(data);
                        newCounts[subdir.key] = emails.length;
                    } catch (err) {
                        newCounts[subdir.key] = 0;
                    }
                }
                setCounts(newCounts);
            };

            // Garantit qu'un instructions.json existe pour chaque categorie non
            // vide, ecrit avec les decisions par defaut (delete pour trash,
            // other pour les autres). Sans cela, /process-todo ne traite que
            // les categories ouvertes par l'utilisateur dans le dashboard
            // (les loadSubdirEmails n'etant declenche que sur switchSubdir).
            // Idempotent : ne touche jamais un instructions.json existant.
            const ensureAllInstructions = async (handle) => {
                if (isLocked) return; // ne pas ecrire pendant qu'un cycle Claude tourne
                for (const subdir of SUBDIRS) {
                    try {
                        const todoDir = await handle.getDirectoryHandle('todo');
                        const categoryDir = await todoDir.getDirectoryHandle(subdir.key);
                        // Lire pending_emails — skip si vide ou inexistant
                        let pendingData;
                        try {
                            const pFh = await categoryDir.getFileHandle('pending_emails.json');
                            pendingData = JSON.parse(await (await pFh.getFile()).text());
                        } catch (_) { continue; }
                        const { emails } = extractEmailsAndMeta(pendingData);
                        if (emails.length === 0) continue;
                        // Ne pas ecraser un instructions.json existant
                        try {
                            await categoryDir.getFileHandle('instructions.json');
                            continue; // existe deja, skip
                        } catch (_) { /* absent, on va l'ecrire */ }
                        const defAction = subdir.key === 'trash' ? 'delete' : 'other';
                        const defaults = {};
                        emails.forEach(e => { defaults[e.id] = defAction; });
                        await writeInstructions(handle, subdir.key, emails, defaults);
                    } catch (_) { /* categorie absente, skip */ }
                }
            };

            const bootstrapHandle = async (handle) => {
                setRootHandle(handle);
                setPendingHandle(null);
                loadSubdirEmails(handle, activeSubdir);
                loadAllCounts(handle);
                loadTaskCounts(handle);
                readWorkspaceState(handle).then(s => s && setWorkspaceState(s));
                readInvalidateStamp(handle).then(st => st && setInvalidateStamp(st));
                // Ecrit les instructions.json par defaut pour toutes les categories
                // non vides qui n'en ont pas — process-todo doit pouvoir traiter
                // les mails meme sans interaction utilisateur dans le dashboard.
                ensureAllInstructions(handle);
                await saveHandle(handle);
            };

            const connectFolder = async () => {
                if (!browserSupported) return;
                try {
                    // En mode file://, startIn avec un handle d'une origine
                    // precedente fait planter le picker (ne resout jamais).
                    // On omet donc startIn — l'utilisateur navigue depuis le
                    // dossier par defaut.
                    const handle = await window.showDirectoryPicker({ mode: 'readwrite' });
                    await bootstrapHandle(handle);
                } catch (err) {
                    if (err && err.name !== 'AbortError') console.error(err);
                }
            };

            const reconnectPending = async () => {
                console.log('[todomail] reconnectPending START, pendingHandle?', !!pendingHandle);
                if (!pendingHandle) return;
                // En mode file://, chaque chargement de page est une origine
                // unique. Donc `startIn: pendingHandle` (handle issu d'IndexedDB
                // d'une origine precedente) cause un picker qui ouvre puis ne
                // resout jamais (bug constate via DevTools). On l'omet pour
                // garantir que le picker fonctionne correctement.
                let handle;
                try {
                    console.log('[todomail] calling showDirectoryPicker (no startIn)...');
                    handle = await window.showDirectoryPicker({ mode: 'readwrite' });
                    console.log('[todomail] picker resolved with handle:', handle && handle.name);
                } catch (err) {
                    console.warn('[todomail] picker threw:', err && err.name, err && err.message);
                    return;
                }
                if (!handle) {
                    console.warn('[todomail] picker returned no handle');
                    return;
                }
                try {
                    console.log('[todomail] calling bootstrapHandle...');
                    await bootstrapHandle(handle);
                    console.log('[todomail] bootstrapHandle done');
                } catch (err) {
                    console.error('[todomail] bootstrapHandle failed:', err);
                }
            };

            const forgetWorkspace = async () => {
                await clearHandle();
                setPendingHandle(null);
                setRootHandle(null);
            };

            // Reconnexion automatique au mount : lit IndexedDB. Si la permission
            // est encore active (Chromium peut la memoriser apres un reload),
            // un test silencieux d'acces fonctionne et on rebranche sans clic.
            // Sinon on bascule sur le bouton « Reprendre la connexion ».
            // On evite deliberement queryPermission/requestPermission qui se
            // comportent mal sur les handles persistes (cf. fallback picker
            // dans reconnectPending).
            useEffect(() => {
                if (!browserSupported) { setReconnecting(false); return; }
                (async () => {
                    try {
                        const stored = await loadHandle();
                        if (!stored) { setReconnecting(false); return; }
                        // Test silencieux d'acces : tenter de lister une entree.
                        // Si la permission est encore granted, ca passe sans dialog.
                        // Sinon, ca jette et on attend le clic utilisateur.
                        try {
                            // eslint-disable-next-line no-unused-vars
                            for await (const _entry of stored.values()) break;
                            console.log('[todomail] auto-reconnect OK (silent access)');
                            await bootstrapHandle(stored);
                        } catch (_) {
                            console.log('[todomail] silent access denied, waiting for user click');
                            setPendingHandle(stored);
                        }
                    } catch (e) { console.warn('[todomail] reconnect mount failed:', e); }
                    setReconnecting(false);
                })();
            }, [browserSupported]);

            const writeInstructions = async (handle, subdirKey, emailsList, decisionsMap) => {
                try {
                    const defAction = subdirKey === 'trash' ? 'delete' : 'other';
                    const todoDir = await handle.getDirectoryHandle('todo');
                    const categoryDir = await todoDir.getDirectoryHandle(subdirKey);
                    const result = emailsList.map(e => ({ id: e.id, action: decisionsMap[e.id] || defAction }));
                    const fh = await categoryDir.getFileHandle('instructions.json', { create: true });
                    const writable = await fh.createWritable();
                    await writable.write(JSON.stringify(result, null, 2));
                    await writable.close();
                    showToast('saved');
                } catch (err) {
                    console.error('Erreur écriture instructions.json:', err);
                    showToast('error');
                }
            };

            const loadSubdirEmails = async (handle, subdirKey, options = {}) => {
                const { preserveUi = false } = options;
                try {
                    const todoDir = await handle.getDirectoryHandle('todo');
                    const categoryDir = await todoDir.getDirectoryHandle(subdirKey);
                    const fileHandle = await categoryDir.getFileHandle('pending_emails.json');
                    const data = JSON.parse(await (await fileHandle.getFile()).text());
                    const { emails, meta } = extractEmailsAndMeta(data);
                    setEmails(emails);
                    setPendingMeta(meta);
                    if (!preserveUi) {
                        setSearchTerm("");
                        setExpandedCard(null);
                    }
                    setCounts(prev => ({ ...prev, [subdirKey]: emails.length }));

                    const defAction = subdirKey === 'trash' ? 'delete' : 'other';
                    let loadedDecisions = {};
                    let loadedInstrMeta = null;
                    try {
                        const instrFile = await categoryDir.getFileHandle('instructions.json');
                        const instrData = JSON.parse(await (await instrFile.getFile()).text());
                        const { instructions: instrList, meta: instrMeta } = extractInstructionsAndMeta(instrData);
                        loadedInstrMeta = instrMeta;
                        if (instrList.length > 0) {
                            instrList.forEach(instr => { loadedDecisions[instr.id] = instr.action; });
                        }
                    } catch (_) {}
                    setInstructionsMeta(loadedInstrMeta);
                    const hadInstructionsFile = Object.keys(loadedDecisions).length > 0 || loadedInstrMeta !== null;
                    emails.forEach(e => {
                        if (!loadedDecisions[e.id]) loadedDecisions[e.id] = defAction;
                    });
                    setDecisions(loadedDecisions);
                    // Phase 5 : ecriture initiale conditionnelle. On n'ecrit
                    // les decisions par defaut que si le fichier est absent (ou
                    // vide) — pour que /process-todo ait quelque chose a traiter
                    // meme si l'utilisateur ne touche a rien. Si un instructions.json
                    // existe deja (ecrit par un cycle precedent ou par Claude),
                    // on ne l'ecrase pas.
                    if (!hadInstructionsFile && emails.length > 0 && !isLocked) {
                        writeInstructions(handle, subdirKey, emails, loadedDecisions);
                    }
                } catch (err) {
                    setEmails([]);
                    setPendingMeta(null);
                    setInstructionsMeta(null);
                    setDecisions({});
                    if (!preserveUi) {
                        setSearchTerm("");
                        setExpandedCard(null);
                    }
                    setCounts(prev => ({ ...prev, [subdirKey]: 0 }));
                }
            };

            const switchSubdir = (subdirKey) => {
                setActiveSubdir(subdirKey);
                setSelectedMail(null);
                setExpandedCard(null);
                if (rootHandle) loadSubdirEmails(rootHandle, subdirKey);
            };

            // ========== PHASE 5 — Polling 3s sur .todomail/state.json + .todomail/invalidate.txt ==========

            const getRuntimeDir = async (handle) => {
                try {
                    return await handle.getDirectoryHandle('.todomail');
                } catch (_) {
                    return null;
                }
            };

            const readWorkspaceState = async (handle) => {
                try {
                    const rt = await getRuntimeDir(handle);
                    if (!rt) return null;
                    const fh = await rt.getFileHandle('state.json');
                    const file = await fh.getFile();
                    const content = await file.text();
                    return JSON.parse(content);
                } catch (_) {
                    return null;
                }
            };

            const readInvalidateStamp = async (handle) => {
                try {
                    const rt = await getRuntimeDir(handle);
                    if (!rt) return null;
                    const fh = await rt.getFileHandle('invalidate.txt');
                    const file = await fh.getFile();
                    return file.lastModified;
                } catch (_) {
                    return null;
                }
            };

            const refreshAll = async (handle, opts = {}) => {
                await Promise.all([
                    loadSubdirEmails(handle, activeSubdir, { preserveUi: true }),
                    loadAllCounts(handle),
                    loadTaskCounts(handle),
                ]);
                // Apres un cycle Claude (sort-mails ajoute des mails), garantir
                // qu'un instructions.json par defaut existe pour les nouvelles
                // categories non vides — sans cela le prochain process-todo
                // ignorerait les nouveaux mails.
                ensureAllInstructions(handle);
                if (opts.withToast) showToast('refreshed');
            };

            // Polling 3s : compare invalidate stamp + detecte changement de session_id
            useEffect(() => {
                if (!rootHandle) return;
                let cancelled = false;
                let prevStamp = invalidateStamp;
                let prevSessionId = currentSessionId;
                let prevLock = activeLock;
                let prevErrorsHash = JSON.stringify(rawErrors.map(e => e.mail_id));

                const tick = async () => {
                    if (cancelled) return;
                    const [stamp, state] = await Promise.all([
                        readInvalidateStamp(rootHandle),
                        readWorkspaceState(rootHandle),
                    ]);
                    if (cancelled) return;

                    const newSessionId = state && state.session_id ? state.session_id : null;
                    const newLock = state && state.active_lock ? state.active_lock : null;
                    const newErrorsHash = JSON.stringify((state && Array.isArray(state.errors) ? state.errors : []).map(e => e.mail_id));

                    const stampChanged = stamp && stamp !== prevStamp;
                    const sessionChanged = newSessionId && newSessionId !== prevSessionId;
                    const lockReleased = prevLock && !newLock;
                    const errorsChanged = newErrorsHash !== prevErrorsHash;

                    if (state) setWorkspaceState(state);
                    if (stamp) setInvalidateStamp(stamp);

                    if (stampChanged || sessionChanged || lockReleased || errorsChanged) {
                        try { await refreshAll(rootHandle, { withToast: lockReleased }); } catch (_) {}
                    }

                    prevStamp = stamp || prevStamp;
                    prevSessionId = newSessionId || prevSessionId;
                    prevLock = newLock;
                    prevErrorsHash = newErrorsHash;
                };

                // Premier tick immediat puis interval 3s
                tick();
                const id = setInterval(tick, 3000);
                return () => { cancelled = true; clearInterval(id); };
            }, [rootHandle, activeSubdir]);

            // ========== PHASE 5 — Fichiers-marqueurs retry / dismiss ==========

            const writeMarkerFile = async (filename, lines) => {
                if (!rootHandle) return false;

                    const rt = await rootHandle.getDirectoryHandle('.todomail', { create: true });

                    const writable = await fh.createWritable();
                    const content = lines.length ? lines.join('\n') + '\n' : '';
                    await writable.write(content);
                    await writable.close();
                    return true;
                } catch (err) {
                    console.error(`Erreur ecriture .todomail/${filename}:`, err);
                    return false;
                }
            };

            const requestRetryAll = async () => {

            // ========== PHASE 5 — Vue Memoire ==========

            const loadMemorySection = async (handle, sectionKey) => {

                        setMemoryFiles([]);
                        setMemoryCounts(prev => ({ ...prev, claude: 0 }));
                    }
                    return;

                    const dir = await memDir.getDirectoryHandle(sectionKey);

                        if (entry.kind === 'file' && entry.name.endsWith('.md')) {

                            files.push({ name: entry.name, path: `memory/${sectionKey}/${entry.name}`, content });

            const switchMemorySection = (sectionKey) => {

            const saveMemoryFile = async () => {
                if (!editModal || editModal.type !== 'memory') return;

                    if (editModal.section === 'claude') {

                        const writable = await fh.createWritable();
                        await writable.write(editModal.content);
                        await writable.close();
                    } else {
                        const memDir = await rootHandle.getDirectoryHandle('memory');
                        const dir = await memDir.getDirectoryHandle(editModal.section);
                        const fh = await dir.getFileHandle(editModal.key, { create: true });
                        const writable = await fh.createWritable();
                        await writable.write(editModal.content);
                        await writable.close();

            const removeMemoryFile = async (sectionKey, filename) => {

                    const memDir = await rootHandle.getDirectoryHandle('memory');
                    const dir = await memDir.getDirectoryHandle(sectionKey);
                    await dir.removeEntry(filename);
                    await loadMemorySection(rootHandle, sectionKey);

                    console.error(err);
                    showToast('error');
                }

            const filteredMemory = useMemo(() => {
                const term = memorySearch.toLowerCase();
                if (!term) return memoryFiles;
                return memoryFiles.filter(f =>
                    f.name.toLowerCase().includes(term) ||
                    f.content.toLowerCase().includes(term)

            // Charge memoire quand on bascule vers la vue
            useEffect(() => {
                if (activeView === 'memory' && rootHandle) {
                    loadMemoryCounts(rootHandle);

            const filteredEmails = useMemo(() => {
                const term = searchTerm.toLowerCase();
                if (!term) return emails;
                return emails.filter(mail => {
                    if (mail.sender && mail.sender.toLowerCase().includes(term)) return true;
                    const mainVal = mail[activeConfig.displayField];
                    if (mainVal && mainVal.toLowerCase().includes(term)) return true;
                    if (activeConfig.extraField) {
                        const extraVal = mail[activeConfig.extraField];
                        if (extraVal && extraVal.toLowerCase().includes(term)) return true;

            const openAttachment = async (id, fileName) => {

                    setTaskCounts(prev => ({ ...prev, "to-send": 0 }));

                                    }

                            }

                                dirName: entry.name,
                                label: entry.name.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' '),
                                checklist: checklistContent,
                                documents: documents.sort()
                            });
                        }
                    }
                    tasks.sort((a, b) => a.dirName.localeCompare(b.dirName));
                    setToWorkTasks(tasks);
                    setTaskCounts(prev => ({ ...prev, "to-work": tasks.length }));
                } catch (_) {
                    setToWorkTasks([]);
                    setTaskCounts(prev => ({ ...prev, "to-work": 0 }));
                }
            };

            const switchTaskSection = (sectionKey) => {
                setActiveTaskSection(sectionKey);
                setTaskSearchTerm("");
                setExpandedTaskCard(null);
                if (rootHandle) {
                    if (sectionKey === 'consult') loadConsultEntries(rootHandle);
                    else if (sectionKey === 'to-send') loadToSendFiles(rootHandle);
                    else if (sectionKey === 'to-work') loadToWorkTasks(rootHandle);

            };

            // Load task data when switching to tasks view
            useEffect(() => {
                if (activeView === 'tasks' && rootHandle) {
                    switchTaskSection(activeTaskSection);

            }, [activeView]);

            const removeConsultEntry = async (entryId) => {
                const remaining = consultEntries.filter(e => e.id !== entryId);
                try {
                    const fh = await rootHandle.getFileHandle('consult.md', { create: true });
                    const writable = await fh.createWritable();
                    await writable.write(buildConsultMd(remaining));
                    await writable.close();
                    setConsultEntries(remaining);
                    setTaskCounts(prev => ({ ...prev, consult: remaining.length }));
                    showToast('saved');

                    showToast('error');

            const removeToSendFile = async (filename) => {

            const copyToClipboard = async (text, fieldId) => {

            // Filtered task data

                );

            // Render simple markdown checklist
            const renderChecklist = (md) => {
                return md.split('\n').map((line, i) => {
                    const checked = line.match(/^\s*-\s*\[x\]/i);
                    const unchecked = line.match(/^\s*-\s*\[\s?\]/);
                    if (checked || unchecked) {
                        const text = line.replace(/^\s*-\s*\[.?\]\s*/, '');
                        return (
                            <div key={i} className="flex items-start gap-2 py-0.5">
                                <span className={`mt-0.5 flex-shrink-0 w-4 h-4 rounded border flex items-center justify-center text-[10px] ${checked ? 'bg-emerald-100 border-emerald-400 text-emerald-600 dark:bg-emerald-900/30 dark:border-emerald-700' : 'border-slate-300 dark:border-slate-600'}`}>
                                    {checked && '\u2713'}
                                </span>
                                <span className={`text-sm ${checked ? 'line-through text-slate-400' : 'text-slate-700 dark:text-slate-300'}`}>{text}</span>
                            </div>
                        );
                    }
                    if (line.startsWith('# ')) return <h3 key={i} className="font-black text-base mt-2 mb-1">{line.slice(2)}</h3>;
                    if (line.startsWith('## ')) return <h4 key={i} className="font-bold text-sm mt-2 mb-1 text-slate-600 dark:text-slate-400">{line.slice(3)}</h4>;
                    if (line.startsWith('**') && line.endsWith('**')) return <p key={i} className="font-bold text-sm mt-1">{line.slice(2, -2)}</p>;
                    if (line.match(/^\*\*.*?\*\*/)) {
                        const parts = line.split(/(\*\*.*?\*\*)/);
                        return <p key={i} className="text-sm text-slate-600 dark:text-slate-300">{parts.map((p, j) => p.startsWith('**') ? <strong key={j}>{p.slice(2,-2)}</strong> : p)}</p>;
                    }
                    if (line.trim()) return <p key={i} className="text-sm text-slate-600 dark:text-slate-300">{line}</p>;
                    return null;
                });
            };

            // Detect file type for icons
            const getFileIcon = (name) => {
                const ext = name.split('.').pop().toLowerCase();
                if (['pdf'].includes(ext)) return 'file-text';
                if (['docx', 'doc', 'odt'].includes(ext)) return 'file-type';
                if (['xlsx', 'xls', 'ods', 'csv'].includes(ext)) return 'table';
                if (['pptx', 'ppt', 'odp'].includes(ext)) return 'presentation';
                if (['png', 'jpg', 'jpeg', 'gif', 'svg'].includes(ext)) return 'image';

            // Ecran plein page : navigateur sans File System Access API
            if (!browserSupported) {

                            <div className="inline-flex items-center justify-center w-14 h-14 bg-red-100 dark:bg-red-900/30 text-red-600 rounded-2xl mb-4">
                                <Icon name="alert-octagon" size={28} />

                            <p className="text-sm text-slate-600 dark:text-slate-300 mb-4">
                                Ce dashboard utilise l'API <code className="font-mono text-xs bg-slate-100 dark:bg-slate-800 px-1 rounded">File System Access</code> pour lire et écrire dans ton dossier de travail. Cette API n'est disponible que dans les navigateurs Chromium.
                            </p>
                            <div className="bg-slate-50 dark:bg-slate-900 rounded-xl p-4 text-sm">
                                <div className="font-bold text-emerald-600 mb-2 flex items-center gap-2"><Icon name="check-circle" size={14} /> Navigateurs supportés</div>
                                <ul className="text-slate-600 dark:text-slate-300 space-y-1 text-xs pl-6 list-disc">
                                    <li>Google Chrome, Microsoft Edge, Arc</li>
                                    <li>DIA (dérivé Chromium)</li>
                                    <li>Opera, Brave, Vivaldi (Chromium)</li>

                                <div className="font-bold text-red-600 mt-4 mb-2 flex items-center gap-2"><Icon name="x-circle" size={14} /> Navigateurs non supportés</div>
                                <ul className="text-slate-600 dark:text-slate-300 space-y-1 text-xs pl-6 list-disc">
                                    <li>Safari, Orion (WebKit — Apple refuse l'API)</li>
                                    <li>Firefox</li>
                                </ul>

                            <span className="text-sm font-medium">Reconnexion au projet…</span>
                        </div>

            }

            return (
                <div className="min-h-screen flex flex-col">

                    <nav className="sticky top-0 z-40 glass-nav px-6 py-4 flex justify-between items-center">
                        <div className="flex items-center gap-6">
                            <div className="flex items-center gap-3">
                                <div className="bg-blue-600 p-2 rounded-lg text-white">
                                    <Icon name="bot" />
                                </div>
                                <h1 className="font-bold text-xl tracking-tight">
                                    Todomail <span className="text-blue-500 font-light">Dashboard</span>
                                </h1>
                            </div>

                            {/* Menu de navigation */}
                            <div className="flex items-center gap-1 bg-slate-100 dark:bg-slate-800 rounded-xl p-1">
                                {[
                                    { key: "categorization", label: "Catégorisation", icon: "inbox", enabled: true },
                                    { key: "memory", label: "Mémoire", icon: "brain", enabled: true },
                                    { key: "tasks", label: "Tâches", icon: "list-checks", enabled: true },
                                ].map(view => (
                                    <button

                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 backdrop-blur-md bg-slate-950/40">
                            <div className="bg-white dark:bg-darkCard w-full max-w-4xl max-h-[90vh] rounded-[2rem] shadow-2xl overflow-hidden flex flex-col animate-slide-up border border-white/10">
                                <div className="p-6 border-b dark:border-slate-800 flex justify-between items-center">
                                    <div>
                                        <h2 className="text-lg font-black">
                                            {editModal.type === 'to-send' ? `Éditer : ${editModal.key}`
                                                : editModal.type === 'memory' ? `Éditer mémoire : ${editModal.key}`
                                                : `Éditer checklist : ${editModal.key}`}
                                        </h2>
                                    </div>
                                    <div className="flex items-center gap-2">
                                        <button onClick={saveEditModal} className="bg-blue-600 text-white px-4 py-2 rounded-xl font-bold text-sm hover:bg-blue-700 transition-all flex items-center gap-2">
                                            <Icon name="save" size={14} /> Sauvegarder
                                        </button>
                                        <button onClick={() => setEditModal(null)} className="p-3 bg-slate-100 dark:bg-slate-800 rounded-full hover:bg-slate-200 transition-all">
                                            <Icon name="x" size={18} />
                                        </button>
                                    </div>
                                </div>
                                <div className="flex-1 p-6 overflow-hidden">
                                    <textarea
                                        value={editModal.content}
                                        onChange={(e) => setEditModal({ ...editModal, content: e.target.value })}
                                        className="w-full h-full min-h-[50vh] bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl p-4 font-mono text-sm text-slate-700 dark:text-slate-300 outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 resize-none"
                                        spellCheck={false}
                                    />
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
