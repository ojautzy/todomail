<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todomail - Dashboard Cowork</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { darkBg: '#0f172a', darkCard: '#1e293b', darkSidebar: '#162032' } } }
        }
    </script>
    <style>
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.3s ease-out forwards; }
        .glass-nav { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .dark .glass-nav { background: rgba(15, 23, 42, 0.8); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .card-expand { max-height: 0; overflow: hidden; transition: max-height 0.35s ease-out, opacity 0.25s ease-out; opacity: 0; }
        .card-expand.open { max-height: 600px; opacity: 1; transition: max-height 0.45s ease-in, opacity 0.3s ease-in; }
        .card-expand.open .card-expand-inner { max-height: 500px; overflow-y: auto; }
        .card-expand-inner::-webkit-scrollbar { width: 6px; }
        .card-expand-inner::-webkit-scrollbar-track { background: transparent; }
        .card-expand-inner::-webkit-scrollbar-thumb { background: rgba(148,163,184,0.3); border-radius: 3px; }
        .card-expand-inner::-webkit-scrollbar-thumb:hover { background: rgba(148,163,184,0.5); }
    </style>
</head>
<body class="bg-slate-50 dark:bg-darkBg text-slate-900 dark:text-slate-100 transition-colors duration-500 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;

        const SUBDIRS = [
            { key: "trash", label: "Corbeille", icon: "trash-2", displayField: "summary", displayLabel: "Resumé" },
            { key: "do-read-quick", label: "A lire (rapide)", icon: "book-open", displayField: "synth", displayLabel: "Synthèse" },
            { key: "do-read-long", label: "A lire (long)", icon: "file-text", displayField: "detailed-synth", displayLabel: "Synthèse détaillée" },
            { key: "do-decide", label: "Arbitrages rapides", icon: "scale", displayField: "choose-points", displayLabel: "Points d'arbitrage" },
            { key: "do-consult-and-decide", label: "Arbitrages après consultation", icon: "users", displayField: "choose-points", displayLabel: "Points d'arbitrage", extraField: "transmit", extraLabel: "Personne à consulter" },
            { key: "do-other", label: "A déléguer", icon: "forward", displayField: "synth", displayLabel: "Synthèse", extraField: "transmit", extraLabel: "Personne délégataire" },
            { key: "do-self", label: "A faire", icon: "user-check", displayField: "synth", displayLabel: "Synthèse" },
        ];

        const TASK_SECTIONS = [
            { key: "consult", label: "Suivi consultations", icon: "eye" },
            { key: "to-send", label: "Mails à envoyer", icon: "send" },
            { key: "to-work", label: "Travail à faire", icon: "clipboard-list" },
        ];

        const Icon = ({ name, size = 20, className = "" }) => {
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        // Parse YAML frontmatter from markdown content
        function parseFrontmatter(content) {
            const match = content.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n?([\s\S]*)$/);
            if (!match) return { meta: {}, body: content };
            const meta = {};
            match[1].split('\n').forEach(line => {
                const idx = line.indexOf(':');
                if (idx > 0) {
                    const key = line.slice(0, idx).trim();
                    const val = line.slice(idx + 1).trim();
                    meta[key] = val;
                }
            });
            return { meta, body: match[2] };
        }

        // Parse consult.md markdown table into array of objects
        function parseConsultMd(content) {
            const lines = content.split('\n').filter(l => l.trim().startsWith('|'));
            if (lines.length < 2) return [];
            // Skip header and separator rows
            return lines.slice(2).map(line => {
                const cells = line.split('|').map(c => c.trim()).filter(c => c);
                if (cells.length >= 4) {
                    return { id: cells[0], date: cells[1], destinataire: cells[2], resume: cells[3] };
                }
                return null;
            }).filter(Boolean);
        }

        // Rebuild consult.md content from entries
        function buildConsultMd(entries) {
            let md = "# Registre des consultations\n\n| ID | Date | Destinataire | Résumé |\n|----|------|-------------|--------|\n";
            entries.forEach(e => {
                md += `| ${e.id} | ${e.date} | ${e.destinataire} | ${e.resume} |\n`;
            });
            return md;
        }

        // Retro-compat lecture pending_emails.json : accepte v1 (tableau brut)
        // et v2 (wrapper { "_meta": ..., "emails": [...] }). Renvoie toujours
        // un tableau.
        function extractEmails(data) {
            if (Array.isArray(data)) return data;
            if (data && Array.isArray(data.emails)) return data.emails;
            return [];
        }

        // Extract recipient display name from filename like "jean-martin_01.md"
        function recipientFromFilename(filename) {
            const base = filename.replace(/\.md$/, '');
            const parts = base.split('_');
            parts.pop(); // remove number
            return parts.join('_').split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
        }

        // Recursive directory removal via File System Access API
        async function removeDirectoryRecursive(parentHandle, dirName) {
            await parentHandle.removeEntry(dirName, { recursive: true });
        }

        function App() {
            const [isDark, setIsDark] = useState(false);
            const [rootHandle, setRootHandle] = useState(null);
            const [emails, setEmails] = useState([]);
            const [searchTerm, setSearchTerm] = useState("");
            const [selectedMail, setSelectedMail] = useState(null);
            const [decisions, setDecisions] = useState({});
            const [activeSubdir, setActiveSubdir] = useState("trash");
            const [expandedCard, setExpandedCard] = useState(null);
            const [counts, setCounts] = useState({});
            const [saveStatus, setSaveStatus] = useState(null);
            const [activeView, setActiveView] = useState("categorization");

            // Tasks view state
            const [activeTaskSection, setActiveTaskSection] = useState("consult");
            const [taskSearchTerm, setTaskSearchTerm] = useState("");
            const [consultEntries, setConsultEntries] = useState([]);
            const [toSendFiles, setToSendFiles] = useState([]);
            const [toWorkTasks, setToWorkTasks] = useState([]);
            const [expandedTaskCard, setExpandedTaskCard] = useState(null);
            const [editModal, setEditModal] = useState(null); // { type, key, content }
            const [confirmDelete, setConfirmDelete] = useState(null); // { type, key, label }
            const [copiedField, setCopiedField] = useState(null); // "to:filename" or "body:filename"
            const [taskCounts, setTaskCounts] = useState({ consult: 0, "to-send": 0, "to-work": 0 });

            const activeConfig = SUBDIRS.find(s => s.key === activeSubdir);
            const defaultAction = activeSubdir === 'trash' ? 'delete' : 'other';

            useEffect(() => {
                if (isDark) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }, [isDark]);

            useEffect(() => {
                const timer = setTimeout(() => lucide.createIcons(), 50);
                return () => clearTimeout(timer);
            }, [activeSubdir, rootHandle, emails, selectedMail, isDark, expandedCard, saveStatus, activeView, activeTaskSection, consultEntries, toSendFiles, toWorkTasks, expandedTaskCard, editModal, confirmDelete, copiedField]);

            const showToast = (type) => {
                setSaveStatus(type);
                setTimeout(() => setSaveStatus(null), 2000);
            };

            // ========== CATEGORIZATION VIEW LOGIC (unchanged) ==========

            const loadAllCounts = async (handle) => {
                const newCounts = {};
                for (const subdir of SUBDIRS) {
                    try {
                        const todoDir = await handle.getDirectoryHandle('todo');
                        const categoryDir = await todoDir.getDirectoryHandle(subdir.key);
                        const fileHandle = await categoryDir.getFileHandle('pending_emails.json');
                        const data = JSON.parse(await (await fileHandle.getFile()).text());
                        const emails = extractEmails(data);
                        newCounts[subdir.key] = emails.length;
                    } catch (err) {
                        newCounts[subdir.key] = 0;
                    }
                }
                setCounts(newCounts);
            };

            const connectFolder = async () => {
                try {
                    const handle = await window.showDirectoryPicker({ mode: 'readwrite' });
                    setRootHandle(handle);
                    loadSubdirEmails(handle, activeSubdir);
                    loadAllCounts(handle);
                    loadTaskCounts(handle);
                } catch (err) { console.error(err); }
            };

            const writeInstructions = async (handle, subdirKey, emailsList, decisionsMap) => {
                try {
                    const defAction = subdirKey === 'trash' ? 'delete' : 'other';
                    const todoDir = await handle.getDirectoryHandle('todo');
                    const categoryDir = await todoDir.getDirectoryHandle(subdirKey);
                    const result = emailsList.map(e => ({ id: e.id, action: decisionsMap[e.id] || defAction }));
                    const fh = await categoryDir.getFileHandle('instructions.json', { create: true });
                    const writable = await fh.createWritable();
                    await writable.write(JSON.stringify(result, null, 2));
                    await writable.close();
                    showToast('saved');
                } catch (err) {
                    console.error('Erreur écriture instructions.json:', err);
                    showToast('error');
                }
            };

            const loadSubdirEmails = async (handle, subdirKey) => {
                try {
                    const todoDir = await handle.getDirectoryHandle('todo');
                    const categoryDir = await todoDir.getDirectoryHandle(subdirKey);
                    const fileHandle = await categoryDir.getFileHandle('pending_emails.json');
                    const data = JSON.parse(await (await fileHandle.getFile()).text());
                    const emails = extractEmails(data);
                    setEmails(emails);
                    setSearchTerm("");
                    setExpandedCard(null);
                    setCounts(prev => ({ ...prev, [subdirKey]: emails.length }));

                    const defAction = subdirKey === 'trash' ? 'delete' : 'other';
                    let loadedDecisions = {};
                    try {
                        const instrFile = await categoryDir.getFileHandle('instructions.json');
                        const instrData = JSON.parse(await (await instrFile.getFile()).text());
                        const instrList = Array.isArray(instrData)
                            ? instrData
                            : (instrData && Array.isArray(instrData.instructions) ? instrData.instructions : []);
                        if (instrList.length > 0) {
                            instrList.forEach(instr => { loadedDecisions[instr.id] = instr.action; });
                        }
                    } catch (_) {}
                    emails.forEach(e => {
                        if (!loadedDecisions[e.id]) loadedDecisions[e.id] = defAction;
                    });
                    setDecisions(loadedDecisions);
                    if (emails.length > 0) {
                        writeInstructions(handle, subdirKey, emails, loadedDecisions);
                    }
                } catch (err) {
                    setEmails([]);
                    setDecisions({});
                    setSearchTerm("");
                    setExpandedCard(null);
                    setCounts(prev => ({ ...prev, [subdirKey]: 0 }));
                }
            };

            const switchSubdir = (subdirKey) => {
                setActiveSubdir(subdirKey);
                setSelectedMail(null);
                setExpandedCard(null);
                if (rootHandle) loadSubdirEmails(rootHandle, subdirKey);
            };

            const filteredEmails = useMemo(() => {
                const term = searchTerm.toLowerCase();
                if (!term) return emails;
                return emails.filter(mail => {
                    if (mail.sender && mail.sender.toLowerCase().includes(term)) return true;
                    const mainVal = mail[activeConfig.displayField];
                    if (mainVal && mainVal.toLowerCase().includes(term)) return true;
                    if (activeConfig.extraField) {
                        const extraVal = mail[activeConfig.extraField];
                        if (extraVal && extraVal.toLowerCase().includes(term)) return true;
                    }
                    return false;
                });
            }, [emails, searchTerm, activeSubdir]);

            const openAttachment = async (id, fileName) => {
                try {
                    const todoDir = await rootHandle.getDirectoryHandle('todo');
                    const categoryDir = await todoDir.getDirectoryHandle(activeSubdir);
                    const mailDir = await categoryDir.getDirectoryHandle(id);
                    const fileHandle = await mailDir.getFileHandle(fileName);
                    const file = await fileHandle.getFile();
                    const url = URL.createObjectURL(file);
                    window.open(url, '_blank');
                } catch (err) { alert("Impossible d'ouvrir le fichier."); }
            };

            const openMailDetails = async (id) => {
                try {
                    const todoDir = await rootHandle.getDirectoryHandle('todo');
                    const categoryDir = await todoDir.getDirectoryHandle(activeSubdir);
                    const mailDir = await categoryDir.getDirectoryHandle(id);
                    const jsonFile = await mailDir.getFileHandle('message.json');
                    const detailData = JSON.parse(await (await jsonFile.getFile()).text());
                    const attachments = [];
                    for await (const entry of mailDir.values()) {
                        if (entry.kind === 'file' && !entry.name.endsWith('.json') && !entry.name.endsWith('.eml')) {
                            attachments.push(entry.name);
                        }
                    }
                    setSelectedMail({ ...detailData, id, attachments });
                } catch (err) { console.error(err); }
            };

            const updateDecision = (mailId, action) => {
                const newDecisions = { ...decisions, [mailId]: action };
                setDecisions(newDecisions);
                if (rootHandle) writeInstructions(rootHandle, activeSubdir, emails, newDecisions);
            };

            const bulkAction = (sender, action) => {
                const newDecisions = { ...decisions };
                emails.forEach(mail => {
                    if (mail.sender === sender) newDecisions[mail.id] = action;
                });
                setDecisions(newDecisions);
                if (rootHandle) writeInstructions(rootHandle, activeSubdir, emails, newDecisions);
            };

            const getSelectStyle = (mailId) => {
                const val = decisions[mailId] || defaultAction;
                if (val === 'delete') return 'text-red-500 bg-red-50 dark:bg-red-900/20';
                if (val === 'other') return 'text-emerald-600 bg-emerald-50 dark:bg-emerald-900/20';
                if (val === 'keep') return 'text-blue-500 bg-blue-50 dark:bg-blue-900/20';
                return 'text-amber-600 bg-amber-50 dark:bg-amber-900/20';
            };

            const toggleExpand = (mailId, e) => {
                e.stopPropagation();
                setExpandedCard(expandedCard === mailId ? null : mailId);
            };

            // ========== TASKS VIEW LOGIC ==========

            const loadTaskCounts = async (handle) => {
                const tc = { consult: 0, "to-send": 0, "to-work": 0 };
                try {
                    const fh = await handle.getFileHandle('consult.md');
                    const content = await (await fh.getFile()).text();
                    tc.consult = parseConsultMd(content).length;
                } catch (_) {}
                try {
                    const dir = await handle.getDirectoryHandle('to-send');
                    for await (const entry of dir.values()) {
                        if (entry.kind === 'file' && entry.name.endsWith('.md')) tc["to-send"]++;
                    }
                } catch (_) {}
                try {
                    const dir = await handle.getDirectoryHandle('to-work');
                    for await (const entry of dir.values()) {
                        if (entry.kind === 'directory') tc["to-work"]++;
                    }
                } catch (_) {}
                setTaskCounts(tc);
            };

            const loadConsultEntries = async (handle) => {
                try {
                    const fh = await handle.getFileHandle('consult.md');
                    const content = await (await fh.getFile()).text();
                    const entries = parseConsultMd(content);
                    setConsultEntries(entries);
                    setTaskCounts(prev => ({ ...prev, consult: entries.length }));
                } catch (_) {
                    setConsultEntries([]);
                    setTaskCounts(prev => ({ ...prev, consult: 0 }));
                }
            };

            const loadToSendFiles = async (handle) => {
                try {
                    const dir = await handle.getDirectoryHandle('to-send');
                    const files = [];
                    for await (const entry of dir.values()) {
                        if (entry.kind === 'file' && entry.name.endsWith('.md')) {
                            const file = await entry.getFile();
                            const content = await file.text();
                            const { meta, body } = parseFrontmatter(content);
                            files.push({
                                filename: entry.name,
                                recipient: recipientFromFilename(entry.name),
                                to: meta.to || '',
                                cc: meta.cc || '',
                                subject: meta.subject || '',
                                date: meta.date || '',
                                refMailId: meta.ref_mail_id || '',
                                body: body.trim(),
                                rawContent: content
                            });
                        }
                    }
                    files.sort((a, b) => a.filename.localeCompare(b.filename));
                    setToSendFiles(files);
                    setTaskCounts(prev => ({ ...prev, "to-send": files.length }));
                } catch (_) {
                    setToSendFiles([]);
                    setTaskCounts(prev => ({ ...prev, "to-send": 0 }));
                }
            };

            const loadToWorkTasks = async (handle) => {
                try {
                    const dir = await handle.getDirectoryHandle('to-work');
                    const tasks = [];
                    for await (const entry of dir.values()) {
                        if (entry.kind === 'directory') {
                            let checklistContent = '';
                            const documents = [];
                            const taskDir = await dir.getDirectoryHandle(entry.name);
                            for await (const fileEntry of taskDir.values()) {
                                if (fileEntry.kind === 'file') {
                                    if (fileEntry.name === 'checklist.md') {
                                        const f = await fileEntry.getFile();
                                        checklistContent = await f.text();
                                    } else {
                                        documents.push(fileEntry.name);
                                    }
                                }
                            }
                            tasks.push({
                                dirName: entry.name,
                                label: entry.name.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' '),
                                checklist: checklistContent,
                                documents: documents.sort()
                            });
                        }
                    }
                    tasks.sort((a, b) => a.dirName.localeCompare(b.dirName));
                    setToWorkTasks(tasks);
                    setTaskCounts(prev => ({ ...prev, "to-work": tasks.length }));
                } catch (_) {
                    setToWorkTasks([]);
                    setTaskCounts(prev => ({ ...prev, "to-work": 0 }));
                }
            };

            const switchTaskSection = (sectionKey) => {
                setActiveTaskSection(sectionKey);
                setTaskSearchTerm("");
                setExpandedTaskCard(null);
                if (rootHandle) {
                    if (sectionKey === 'consult') loadConsultEntries(rootHandle);
                    else if (sectionKey === 'to-send') loadToSendFiles(rootHandle);
                    else if (sectionKey === 'to-work') loadToWorkTasks(rootHandle);
                }
            };

            // Load task data when switching to tasks view
            useEffect(() => {
                if (activeView === 'tasks' && rootHandle) {
                    switchTaskSection(activeTaskSection);
                }
            }, [activeView]);

            const removeConsultEntry = async (entryId) => {
                const remaining = consultEntries.filter(e => e.id !== entryId);
                try {
                    const fh = await rootHandle.getFileHandle('consult.md', { create: true });
                    const writable = await fh.createWritable();
                    await writable.write(buildConsultMd(remaining));
                    await writable.close();
                    setConsultEntries(remaining);
                    setTaskCounts(prev => ({ ...prev, consult: remaining.length }));
                    showToast('saved');
                } catch (err) {
                    console.error(err);
                    showToast('error');
                }
                setConfirmDelete(null);
            };

            const removeToSendFile = async (filename) => {
                try {
                    const dir = await rootHandle.getDirectoryHandle('to-send');
                    await dir.removeEntry(filename);
                    const remaining = toSendFiles.filter(f => f.filename !== filename);
                    setToSendFiles(remaining);
                    setTaskCounts(prev => ({ ...prev, "to-send": remaining.length }));
                    showToast('saved');
                } catch (err) {
                    console.error(err);
                    showToast('error');
                }
                setConfirmDelete(null);
            };

            const removeToWorkTask = async (dirName) => {
                try {
                    const dir = await rootHandle.getDirectoryHandle('to-work');
                    await removeDirectoryRecursive(dir, dirName);
                    const remaining = toWorkTasks.filter(t => t.dirName !== dirName);
                    setToWorkTasks(remaining);
                    setTaskCounts(prev => ({ ...prev, "to-work": remaining.length }));
                    showToast('saved');
                } catch (err) {
                    console.error(err);
                    showToast('error');
                }
                setConfirmDelete(null);
            };

            const saveEditModal = async () => {
                if (!editModal) return;
                try {
                    if (editModal.type === 'to-send') {
                        const dir = await rootHandle.getDirectoryHandle('to-send');
                        const fh = await dir.getFileHandle(editModal.key, { create: true });
                        const writable = await fh.createWritable();
                        await writable.write(editModal.content);
                        await writable.close();
                        await loadToSendFiles(rootHandle);
                    } else if (editModal.type === 'to-work') {
                        const dir = await rootHandle.getDirectoryHandle('to-work');
                        const taskDir = await dir.getDirectoryHandle(editModal.key);
                        const fh = await taskDir.getFileHandle('checklist.md', { create: true });
                        const writable = await fh.createWritable();
                        await writable.write(editModal.content);
                        await writable.close();
                        await loadToWorkTasks(rootHandle);
                    }
                    showToast('saved');
                } catch (err) {
                    console.error(err);
                    showToast('error');
                }
                setEditModal(null);
            };

            const copyToClipboard = async (text, fieldId) => {
                try {
                    await navigator.clipboard.writeText(text);
                    setCopiedField(fieldId);
                    setTimeout(() => setCopiedField(null), 1500);
                } catch (err) { console.error(err); }
            };

            const openToWorkFile = async (dirName, fileName) => {
                try {
                    const dir = await rootHandle.getDirectoryHandle('to-work');
                    const taskDir = await dir.getDirectoryHandle(dirName);
                    const fileHandle = await taskDir.getFileHandle(fileName);
                    const file = await fileHandle.getFile();
                    const url = URL.createObjectURL(file);
                    window.open(url, '_blank');
                } catch (err) { alert("Impossible d'ouvrir le fichier."); }
            };

            // Filtered task data
            const filteredConsult = useMemo(() => {
                const term = taskSearchTerm.toLowerCase();
                if (!term) return consultEntries;
                return consultEntries.filter(e =>
                    e.id.toLowerCase().includes(term) ||
                    e.date.toLowerCase().includes(term) ||
                    e.destinataire.toLowerCase().includes(term) ||
                    e.resume.toLowerCase().includes(term)
                );
            }, [consultEntries, taskSearchTerm]);

            const filteredToSend = useMemo(() => {
                const term = taskSearchTerm.toLowerCase();
                if (!term) return toSendFiles;
                return toSendFiles.filter(f =>
                    f.recipient.toLowerCase().includes(term) ||
                    f.to.toLowerCase().includes(term) ||
                    f.subject.toLowerCase().includes(term) ||
                    f.body.toLowerCase().includes(term)
                );
            }, [toSendFiles, taskSearchTerm]);

            const filteredToWork = useMemo(() => {
                const term = taskSearchTerm.toLowerCase();
                if (!term) return toWorkTasks;
                return toWorkTasks.filter(t =>
                    t.label.toLowerCase().includes(term) ||
                    t.checklist.toLowerCase().includes(term)
                );
            }, [toWorkTasks, taskSearchTerm]);

            // Render simple markdown checklist
            const renderChecklist = (md) => {
                return md.split('\n').map((line, i) => {
                    const checked = line.match(/^\s*-\s*\[x\]/i);
                    const unchecked = line.match(/^\s*-\s*\[\s?\]/);
                    if (checked || unchecked) {
                        const text = line.replace(/^\s*-\s*\[.?\]\s*/, '');
                        return (
                            <div key={i} className="flex items-start gap-2 py-0.5">
                                <span className={`mt-0.5 flex-shrink-0 w-4 h-4 rounded border flex items-center justify-center text-[10px] ${checked ? 'bg-emerald-100 border-emerald-400 text-emerald-600 dark:bg-emerald-900/30 dark:border-emerald-700' : 'border-slate-300 dark:border-slate-600'}`}>
                                    {checked && '\u2713'}
                                </span>
                                <span className={`text-sm ${checked ? 'line-through text-slate-400' : 'text-slate-700 dark:text-slate-300'}`}>{text}</span>
                            </div>
                        );
                    }
                    if (line.startsWith('# ')) return <h3 key={i} className="font-black text-base mt-2 mb-1">{line.slice(2)}</h3>;

                                                                        <Icon name="check" size={14} />
                                                                    </button>
                                                                    <button onClick={() => setConfirmDelete(null)} className="p-1.5 bg-slate-100 dark:bg-slate-800 text-slate-500 rounded-lg hover:bg-slate-200 transition-all">
                                                                        <Icon name="x" size={14} />
                                                                    </button>
                                                                </div>
                                                            ) : (
                                                                <button
                                                                    onClick={() => setConfirmDelete({ type: 'to-send', key: file.filename, label: file.recipient })}
                                                                    className="p-2 rounded-lg text-slate-300 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 transition-all"
                                                                    title="Marquer comme envoyé"
                                                                >
                                                                    <Icon name="circle-check" size={18} />
                                                                </button>
                                                            )}
                                                        </div>
                                                    </div>

                                                    {/* FLYOVER TO-SEND */}
                                                    <div className={`card-expand ${isExpanded ? 'open' : ''}`}>
                                                        <div className="px-5 pb-5 pt-1 border-t border-slate-100 dark:border-slate-800">
                                                            <div className="mt-3 space-y-3 card-expand-inner">
                                                                {/* Destinataire(s) */}
                                                                <div className="flex items-center gap-2">
                                                                    <div className="flex-1">
                                                                        <div className="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-1">Destinataire</div>
                                                                        <p className="text-sm text-blue-600 dark:text-blue-400 font-mono">{file.to || "\u2014"}</p>
                                                                    </div>
                                                                    {file.to && (
                                                                        <button
                                                                            onClick={() => copyToClipboard(file.to, `to:${file.filename}`)}
                                                                            className="p-2 rounded-lg text-slate-400 hover:text-emerald-500 hover:bg-emerald-50 dark:hover:bg-emerald-900/20 transition-all"
                                                                            title="Copier le destinataire"
                                                                        >
                                                                            <Icon name={copiedField === `to:${file.filename}` ? "check-circle" : "clipboard-copy"} size={16} />
                                                                        </button>
                                                                    )}
                                                                </div>
                                                                {file.cc && (
                                                                    <div className="flex items-center gap-2">
                                                                        <div className="flex-1">
                                                                            <div className="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-1">Copie</div>
                                                                            <p className="text-sm text-slate-600 dark:text-slate-300 font-mono">{file.cc}</p>
                                                                        </div>
                                                                        <button
                                                                            onClick={() => copyToClipboard(file.cc, `cc:${file.filename}`)}
                                                                            className="p-2 rounded-lg text-slate-400 hover:text-emerald-500 hover:bg-emerald-50 dark:hover:bg-emerald-900/20 transition-all"
                                                                            title="Copier la copie"
                                                                        >
                                                                            <Icon name={copiedField === `cc:${file.filename}` ? "check-circle" : "clipboard-copy"} size={16} />
                                                                        </button>
                                                                    </div>
                                                                )}
                                                                {/* Objet */}
                                                                <div>
                                                                    <div className="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-1">Objet</div>
                                                                    <p className="text-sm font-bold text-slate-700 dark:text-slate-200">{file.subject || "\u2014"}</p>
                                                                </div>
                                                                {/* Corps */}
                                                                <div className="flex items-start gap-2">
                                                                    <div className="flex-1">
                                                                        <div className="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-1">Corps du mail</div>
                                                                        <div className="text-sm text-slate-600 dark:text-slate-300 leading-relaxed whitespace-pre-wrap border-l-4 border-blue-500/20 pl-4 max-h-60 overflow-y-auto">
                                                                            {file.body || "\u2014"}
                                                                        </div>
                                                                    </div>
                                                                    {file.body && (
                                                                        <button
                                                                            onClick={() => copyToClipboard(file.body, `body:${file.filename}`)}
                                                                            className="p-2 rounded-lg text-slate-400 hover:text-emerald-500 hover:bg-emerald-50 dark:hover:bg-emerald-900/20 transition-all mt-4"
                                                                            title="Copier le corps"
                                                                        >
                                                                            <Icon name={copiedField === `body:${file.filename}` ? "check-circle" : "clipboard-copy"} size={16} />
                                                                        </button>
                                                                    )}
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                                );
                                            })}
                                            {filteredToSend.length === 0 && (
                                                <div className="py-20 text-center animate-slide-up">
                                                    <div className="inline-flex p-4 bg-slate-100 dark:bg-slate-800 rounded-full text-slate-400 mb-4">
                                                        <Icon name="send" size={32} />
                                                    </div>
                                                    <p className="text-slate-500 font-medium">
                                                        {taskSearchTerm ? "Aucun mail ne correspond." : "Aucun mail à envoyer."}
                                                    </p>
                                                </div>
                                            )}
                                        </div>
                                    )}

                                    {/* ---- TO-WORK SECTION ---- */}
                                    {activeTaskSection === "to-work" && (
                                        <div className="space-y-3">
                                            {filteredToWork.map(task => {
                                                const isExpanded = expandedTaskCard === task.dirName;
                                                return (
                                                <div key={task.dirName} className="animate-slide-up bg-white dark:bg-darkCard border border-slate-200 dark:border-slate-800 rounded-2xl group hover:shadow-xl transition-all">
                                                    <div className="flex items-center">
                                                        <div className="flex-1 p-5">
                                                            <div className="flex items-center gap-3 mb-1">
                                                                <span className="font-bold text-slate-800 dark:text-slate-100">{task.label}</span>
                                                            </div>
                                                            {task.documents.length > 0 && (
                                                                <p className="text-xs text-slate-400 mt-1 flex items-center gap-1">
                                                                    <Icon name="paperclip" size={12} />
                                                                    {task.documents.length} document(s)
                                                                </p>
                                                            )}
                                                        </div>
                                                        <div className="p-5 flex items-center gap-2">
                                                            <button
                                                                onClick={(e) => { e.stopPropagation(); setExpandedTaskCard(isExpanded ? null : task.dirName); }}
                                                                className={`p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-400 hover:text-blue-500 transition-all ${isExpanded ? 'text-blue-500 bg-blue-50 dark:bg-blue-900/20' : ''}`}
                                                                title="Détails"
                                                            >
                                                                <Icon name={isExpanded ? "chevron-up" : "chevron-down"} size={18} />
                                                            </button>
                                                            <button
                                                                onClick={() => setEditModal({ type: 'to-work', key: task.dirName, content: task.checklist })}
                                                                className="p-2 rounded-lg text-slate-400 hover:text-blue-500 hover:bg-blue-50 dark:hover:bg-blue-900/20 transition-all"
                                                                title="Éditer la checklist"
                                                            >
                                                                <Icon name="pencil" size={18} />
                                                            </button>
                                                            {confirmDelete?.type === 'to-work' && confirmDelete?.key === task.dirName ? (
                                                                <div className="flex items-center gap-1">
                                                                    <button onClick={() => removeToWorkTask(task.dirName)} className="p-1.5 bg-red-100 dark:bg-red-900/30 text-red-600 rounded-lg hover:bg-red-200 transition-all">
                                                                        <Icon name="check" size={14} />
                                                                    </button>
                                                                    <button onClick={() => setConfirmDelete(null)} className="p-1.5 bg-slate-100 dark:bg-slate-800 text-slate-500 rounded-lg hover:bg-slate-200 transition-all">
                                                                        <Icon name="x" size={14} />
                                                                    </button>
                                                                </div>
                                                            ) : (
                                                                <button
                                                                    onClick={() => setConfirmDelete({ type: 'to-work', key: task.dirName, label: task.label })}
                                                                    className="p-2 rounded-lg text-slate-300 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 transition-all"
                                                                    title="Marquer comme terminé"
                                                                >
                                                                    <Icon name="circle-check" size={18} />
                                                                </button>
                                                            )}
                                                        </div>
                                                    </div>

                                                    {/* FLYOVER TO-WORK */}
                                                    <div className={`card-expand ${isExpanded ? 'open' : ''}`}>
                                                        <div className="px-5 pb-5 pt-1 border-t border-slate-100 dark:border-slate-800">
                                                            <div className="mt-3 space-y-4 card-expand-inner">
                                                                {/* Checklist */}
                                                                {task.checklist && (
                                                                    <div>
                                                                        <div className="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-2">Plan d'action</div>
                                                                        <div className="space-y-0.5">{renderChecklist(task.checklist)}</div>
                                                                    </div>
                                                                )}
                                                                {/* Documents */}
                                                                {task.documents.length > 0 && (
                                                                    <div>
                                                                        <div className="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-2">Documents</div>
                                                                        <div className="flex flex-wrap gap-2">
                                                                            {task.documents.map(docName => (
                                                                                <button
                                                                                    key={docName}
                                                                                    onClick={() => openToWorkFile(task.dirName, docName)}
                                                                                    className="flex items-center gap-2 bg-slate-50 dark:bg-slate-800 px-3 py-2 rounded-xl border border-slate-200 dark:border-slate-700 hover:border-blue-500 hover:bg-white dark:hover:bg-slate-700 transition-all shadow-sm group/doc"
                                                                                >
                                                                                    <Icon name={getFileIcon(docName)} size={14} className="text-blue-500 group-hover/doc:scale-110 transition-transform" />
                                                                                    <span className="text-xs font-bold truncate max-w-[180px]">{docName}</span>
                                                                                </button>
                                                                            ))}
                                                                        </div>
                                                                    </div>
                                                                )}
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                                );
                                            })}
                                            {filteredToWork.length === 0 && (
                                                <div className="py-20 text-center animate-slide-up">
                                                    <div className="inline-flex p-4 bg-slate-100 dark:bg-slate-800 rounded-full text-slate-400 mb-4">
                                                        <Icon name="clipboard-list" size={32} />
                                                    </div>
                                                    <p className="text-slate-500 font-medium">
                                                        {taskSearchTerm ? "Aucune tâche ne correspond." : "Aucune tâche en cours."}
                                                    </p>
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </>)}

                            </div>
                        </main>
                    </div>

                    {/* INDICATEUR DE SAUVEGARDE */}
                    {saveStatus && (
                        <div className={`fixed bottom-6 right-6 z-30 px-4 py-2.5 rounded-xl text-sm font-bold shadow-lg transition-all animate-slide-up flex items-center gap-2 ${
                            saveStatus === 'saved'
                                ? 'bg-emerald-500 text-white'
                                : 'bg-red-500 text-white'
                        }`}>
                            <Icon name={saveStatus === 'saved' ? 'check-circle' : 'alert-circle'} size={16} />
                            {saveStatus === 'saved' ? 'Sauvegardé' : 'Erreur de sauvegarde'}
                        </div>
                    )}

                    {/* MODAL MAIL DETAILS (categorization) */}
                    {selectedMail && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 backdrop-blur-md bg-slate-950/40">
                            <div className="bg-white dark:bg-darkCard w-full max-w-4xl max-h-[90vh] rounded-[2rem] shadow-2xl overflow-hidden flex flex-col animate-slide-up border border-white/10">
                                <div className="p-8 border-b dark:border-slate-800 flex justify-between items-start">
                                    <div>
                                        <h2 className="text-2xl font-black leading-tight mb-2">{selectedMail.subject || "Sans objet"}</h2>
                                        <div className="space-y-1">
                                            <div className="flex items-center gap-2 text-sm text-blue-500 font-bold">
                                                <Icon name="user" size={14} /> DE : {selectedMail.from || selectedMail.sender}
                                            </div>
                                            <div className="text-[10px] text-slate-400 font-mono italic uppercase tracking-widest">
                                                ID: {selectedMail.id}
                                            </div>
                                        </div>
                                    </div>
                                    <button onClick={() => setSelectedMail(null)} className="p-3 bg-slate-100 dark:bg-slate-800 rounded-full hover:bg-slate-200 transition-all">
                                        <Icon name="x" />
                                    </button>
                                </div>

                                <div className="flex-1 overflow-y-auto p-8 bg-slate-50/30 dark:bg-slate-900/20">
                                    <div className="font-mono text-sm leading-relaxed whitespace-pre-wrap text-slate-600 dark:text-slate-300 border-l-4 border-blue-500/20 pl-6">
                                        {selectedMail.body_text}
                                    </div>
                                </div>

                                {selectedMail.attachments?.length > 0 && (
                                    <div className="p-8 bg-white dark:bg-darkCard border-t dark:border-slate-800">
                                        <h3 className="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-4 italic">Pièces Jointes (Cliquer pour ouvrir)</h3>
                                        <div className="flex flex-wrap gap-3">
                                            {selectedMail.attachments.map(name => (
                                                <button
                                                    key={name}
                                                    onClick={() => openAttachment(selectedMail.id, name)}
                                                    className="flex items-center gap-3 bg-slate-50 dark:bg-slate-800 px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 hover:border-blue-500 hover:bg-white dark:hover:bg-slate-700 transition-all shadow-sm group"
                                                >
                                                    <Icon name="file" size={16} className="text-blue-500 group-hover:scale-110 transition-transform" />
                                                    <span className="text-xs font-bold truncate max-w-[150px]">{name}</span>
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* MODAL EDITION (tasks) */}
                    {editModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 backdrop-blur-md bg-slate-950/40">
                            <div className="bg-white dark:bg-darkCard w-full max-w-4xl max-h-[90vh] rounded-[2rem] shadow-2xl overflow-hidden flex flex-col animate-slide-up border border-white/10">
                                <div className="p-6 border-b dark:border-slate-800 flex justify-between items-center">
                                    <div>
                                        <h2 className="text-lg font-black">
                                            {editModal.type === 'to-send' ? `Éditer : ${editModal.key}` : `Éditer checklist : ${editModal.key}`}
                                        </h2>
                                    </div>
                                    <div className="flex items-center gap-2">
                                        <button onClick={saveEditModal} className="bg-blue-600 text-white px-4 py-2 rounded-xl font-bold text-sm hover:bg-blue-700 transition-all flex items-center gap-2">
                                            <Icon name="save" size={14} /> Sauvegarder
                                        </button>
                                        <button onClick={() => setEditModal(null)} className="p-3 bg-slate-100 dark:bg-slate-800 rounded-full hover:bg-slate-200 transition-all">
                                            <Icon name="x" size={18} />
                                        </button>
                                    </div>
                                </div>
                                <div className="flex-1 p-6 overflow-hidden">
                                    <textarea
                                        value={editModal.content}
                                        onChange={(e) => setEditModal({ ...editModal, content: e.target.value })}
                                        className="w-full h-full min-h-[50vh] bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl p-4 font-mono text-sm text-slate-700 dark:text-slate-300 outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 resize-none"
                                        spellCheck={false}
                                    />
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
